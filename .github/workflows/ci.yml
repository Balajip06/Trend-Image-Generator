name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-anon-key-placeholder
  SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder

jobs:
  static:
    name: Lint + Typecheck + Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck

  unit:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

  integration:
    name: Vitest (integration — real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      # Boot only the services the SQL integration suite needs. Docker
      # is preinstalled on ubuntu-latest. `db reset` applies every
      # migration from supabase/migrations/ in order.
      - run: supabase start -x studio,inbucket,imgproxy,edge-runtime,realtime
      - run: supabase db reset
      - run: pnpm test:integration
        env:
          INTEGRATION_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:54322/postgres
      # On failure, dump db container logs so trigger raises + RLS
      # rejections are visible in the workflow log.
      - if: failure()
        run: docker logs supabase_db_Trend_Image_generator 2>&1 | tail -200
      - if: always()
        run: supabase stop --no-backup

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static
    # MOCK_TRENDS=true lets the dev server render authed routes against an
    # empty CI Supabase. lib/env.ts only allows this combination because the
    # CI environment variable is auto-set by GitHub Actions; real-prod boots
    # without CI=true would crash. See lib/env.ts getServerEnv guard.
    env:
      MOCK_TRENDS: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm build
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
