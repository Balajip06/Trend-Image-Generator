name: Renovate config validation

on:
  pull_request:
    paths:
      - 'renovate.json'
      - '.renovaterc.json'
      - '.github/renovate*'
  push:
    branches: [main]
    paths:
      - 'renovate.json'

jobs:
  validate:
    name: Validate Renovate config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Validate
        uses: rinchsan/renovate-config-validator@v0.2.1
        with:
          pattern: 'renovate.json'
